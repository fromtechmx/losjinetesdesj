<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Los Jinetes del Apocalipsis: Carrera en San Juan de los Lagos</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; background: #1a1030;
    font-family: 'Trebuchet MS', 'Segoe UI', Arial, sans-serif;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  #app { position: fixed; inset: 0; width: 100%; height: 100%; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; background: #1a1030; }

  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; color: #fff5e6;
    background: radial-gradient(ellipse at center, rgba(60,20,10,0.55) 0%, rgba(20,8,20,0.85) 100%);
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    z-index: 20;
  }
  .hidden { display: none !important; }

  h1.title {
    font-size: clamp(22px, 6vw, 42px);
    margin: 0 0 6px 0;
    color: #ffcf6b;
    text-shadow: 2px 2px 0 #7a2e12, 0 0 20px rgba(255,150,50,0.5);
    letter-spacing: 1px;
    max-width: 90vw;
  }
  .subtitle {
    font-size: clamp(13px, 3.2vw, 18px);
    color: #ffe3b3;
    margin-bottom: 22px;
    max-width: 85vw;
  }

  .riders-preview {
    display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; justify-content: center; max-width: 90vw;
  }
  .rider-chip {
    display: flex; flex-direction: column; align-items: center; font-size: 11px;
    background: rgba(0,0,0,0.3); border-radius: 10px; padding: 6px 8px; border: 1px solid rgba(255,255,255,0.15);
  }
  .rider-chip .swatch { width: 22px; height: 22px; border-radius: 50%; margin-bottom: 4px; border: 2px solid rgba(255,255,255,0.6); }

  .diff-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .diff-btn, .big-btn, .retry-btn {
    font-family: inherit; cursor: pointer; border: none; border-radius: 12px;
    padding: 12px 20px; font-size: 15px; font-weight: bold;
    background: linear-gradient(#4a2e1a, #2c1a0f); color: #ffe3b3;
    border: 2px solid #8a5a2a;
    transition: transform 0.1s ease;
  }
  .diff-btn.active {
    background: linear-gradient(#e08a2b, #b35f13); color: #2c1000; border-color: #ffdca0;
    box-shadow: 0 0 14px rgba(255,180,60,0.7);
  }
  .diff-btn:active, .big-btn:active, .retry-btn:active { transform: scale(0.94); }

  .big-btn {
    font-size: clamp(18px, 4.5vw, 24px);
    padding: 14px 40px;
    background: linear-gradient(#c9401e, #7a1e0a);
    border-color: #ff8a5c;
    box-shadow: 0 4px 0 #4a1204, 0 0 24px rgba(255,90,30,0.5);
  }

  #hud {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: calc(10px + env(safe-area-inset-top)) 14px 0 14px;
    pointer-events: none;
    color: #fff8ec;
    font-size: 14px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
  }
  #hud .col { display: flex; flex-direction: column; gap: 2px; }
  #hud .score { font-size: clamp(16px,4vw,22px); font-weight: bold; color: #ffd873; }
  #riderTag {
    font-weight: bold; font-size: clamp(13px,3.4vw,16px);
    padding: 3px 10px; border-radius: 8px; background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.3);
  }
  #abilityWrap {
    margin-top: 4px; width: 120px; height: 10px; background: rgba(0,0,0,0.4);
    border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.3);
  }
  #abilityBar { height: 100%; width: 0%; background: linear-gradient(90deg,#7fe0ff,#38b6ff); }
  #abilityLabel { font-size: 10px; opacity: 0.85; margin-top: 2px; }

  #riderBanner {
    position: absolute; top: 26%; left: 50%; transform: translate(-50%,-50%);
    z-index: 15; pointer-events: none;
    font-size: clamp(20px, 6vw, 36px); font-weight: bold; color: #fff2c9;
    text-shadow: 0 0 14px rgba(0,0,0,0.9), 2px 2px 0 #7a2e12;
    opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease;
    text-align: center;
  }
  #riderBanner.show { opacity: 1; transform: translate(-50%,-60%); }

  #touchControls {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 12;
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 0 16px calc(18px + env(safe-area-inset-bottom)) 16px;
    pointer-events: none;
  }
  .ctrl-btn {
    pointer-events: auto;
    width: 68px; height: 68px; border-radius: 50%;
    background: rgba(20,10,5,0.45); border: 2px solid rgba(255,255,255,0.55);
    color: #fff; font-size: 12px; font-weight: bold;
    display: flex; align-items: center; justify-content: center; text-align: center;
    -webkit-touch-callout: none;
  }
  .ctrl-btn:active { background: rgba(255,180,60,0.55); }
  #abilityBtn { width: 76px; height: 76px; background: rgba(56,120,255,0.35); }
  #abilityBtn:active { background: rgba(120,220,255,0.7); }
  .ctrl-group { display: flex; gap: 12px; }

  .final-score { font-size: clamp(24px,7vw,40px); color: #ffd873; margin: 6px 0; font-weight: bold; }
  .best-score { font-size: 15px; color: #ffe3b3; margin-bottom: 20px; }

  #muteBtn {
    position: fixed;
    top: calc(10px + env(safe-area-inset-top));
    right: calc(10px + env(safe-area-inset-right));
    z-index: 30;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(20,10,5,0.55); border: 2px solid rgba(255,255,255,0.5);
    color: #fff; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    -webkit-touch-callout: none; cursor: pointer;
  }
  #muteBtn:active { background: rgba(255,180,60,0.55); }
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <div id="muteBtn">🔊</div>

  <div id="hud" class="hidden">
    <div class="col">
      <div class="score" id="scoreLabel">0</div>
      <div style="font-size:11px;opacity:0.85;">Mejor: <span id="bestLabel">0</span></div>
    </div>
    <div class="col" style="align-items:flex-end;">
      <div id="riderTag">Pepe</div>
      <div id="abilityWrap"><div id="abilityBar"></div></div>
      <div id="abilityLabel">Habilidad lista</div>
    </div>
  </div>

  <div id="riderBanner"></div>

  <div id="touchControls" class="hidden">
    <div class="ctrl-group">
      <div class="ctrl-btn" id="btnSlide">DESLIZAR</div>
      <div class="ctrl-btn" id="btnJump">SALTAR</div>
    </div>
    <div class="ctrl-btn" id="abilityBtn">HABILIDAD</div>
  </div>

  <div id="menuScreen" class="screen">
    <h1 class="title">🐎 Los Jinetes del Apocalipsis</h1>
    <div class="subtitle">Carrera en San Juan de los Lagos</div>
    <div class="riders-preview">
      <div class="rider-chip"><div class="swatch" style="background:#3b82f6"></div>Pepe</div>
      <div class="rider-chip"><div class="swatch" style="background:#22c55e"></div>Fabián</div>
      <div class="rider-chip"><div class="swatch" style="background:#ef4444"></div>Alejandro</div>
      <div class="rider-chip"><div class="swatch" style="background:#eab308"></div>Chato</div>
      <div class="rider-chip"><div class="swatch" style="background:#a855f7"></div>Chava</div>
    </div>
    <div class="diff-row">
      <button class="diff-btn" data-diff="facil">Fácil</button>
      <button class="diff-btn active" data-diff="normal">Normal</button>
      <button class="diff-btn" data-diff="dificil">Difícil</button>
    </div>
    <button class="big-btn" id="playBtn">JUGAR</button>
    <div class="subtitle" style="margin-top:18px; font-size:12px;">Espacio/Tap: Saltar · Abajo: Deslizar · E/Botón: Habilidad</div>
  </div>

  <div id="gameoverScreen" class="screen hidden">
    <h1 class="title" style="font-size:clamp(20px,5.5vw,32px);">Fin de la carrera</h1>
    <div class="final-score" id="finalScore">0</div>
    <div class="best-score">Mejor puntaje (<span id="finalDiffLabel">normal</span>): <span id="finalBest">0</span></div>
    <button class="big-btn retry-btn" id="retryBtn">REINTENTAR</button>
    <button class="diff-btn" id="menuBtn" style="margin-top:14px;">Menú</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let DPR = Math.max(1, window.devicePixelRatio || 1);
  let W = 0, H = 0;

  function resize(){
    W = window.innerWidth;
    H = window.innerHeight;
    DPR = Math.max(1, window.devicePixelRatio || 1);
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', resize);
  resize();

  // ---------- audio ----------
  const Audio_ = (function(){
    let actx = null, masterGain = null, musicGain = null, sfxGain = null;
    let noiseBuffer = null;
    let muted = localStorage.getItem('jinetesApocalipsis_muted') === '1';
    let musicPlaying = false, schedulerTimer = null, currentStep = 0, nextStepTime = 0;
    const STEP_DUR = 60 / 132 / 2; // eighth note at 132bpm
    const LEAD = [67,null,71,74,76,74,71,null,67,null,71,74,79,76,74,null];
    const BASS = [43,null,null,null,50,null,null,null,43,null,null,null,50,null,null,null];

    function midiToFreq(m){ return 440 * Math.pow(2, (m-69)/12); }

    function ensure(){
      if (!actx){
        actx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = actx.createGain();
        masterGain.gain.value = muted ? 0 : 1;
        masterGain.connect(actx.destination);
        musicGain = actx.createGain();
        musicGain.gain.value = 0.22;
        musicGain.connect(masterGain);
        sfxGain = actx.createGain();
        sfxGain.gain.value = 0.55;
        sfxGain.connect(masterGain);
      }
      if (actx.state === 'suspended') actx.resume();
      return actx;
    }

    function getNoise(){
      if (!noiseBuffer){
        const size = actx.sampleRate * 1;
        noiseBuffer = actx.createBuffer(1, size, actx.sampleRate);
        const d = noiseBuffer.getChannelData(0);
        for (let i=0;i<size;i++) d[i] = Math.random()*2-1;
      }
      return noiseBuffer;
    }

    function tone(freq, dur, type, dest, startTime, peak, glideTo){
      const osc = actx.createOscillator();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, startTime);
      if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, startTime + dur);
      const g = actx.createGain();
      g.gain.setValueAtTime(0.0001, startTime);
      g.gain.exponentialRampToValueAtTime(Math.max(peak,0.001), startTime + Math.min(0.02,dur*0.3));
      g.gain.exponentialRampToValueAtTime(0.0001, startTime + dur);
      osc.connect(g); g.connect(dest);
      osc.start(startTime);
      osc.stop(startTime + dur + 0.03);
    }

    function noiseBurst(dur, filterFreq, dest, startTime, peak, filterType){
      const src = actx.createBufferSource();
      src.buffer = getNoise();
      const filter = actx.createBiquadFilter();
      filter.type = filterType || 'bandpass';
      filter.frequency.value = filterFreq;
      const g = actx.createGain();
      g.gain.setValueAtTime(peak, startTime);
      g.gain.exponentialRampToValueAtTime(0.0001, startTime + dur);
      src.connect(filter); filter.connect(g); g.connect(dest);
      src.start(startTime); src.stop(startTime + dur + 0.03);
    }

    function scheduleStep(step, time){
      const lead = LEAD[step % LEAD.length];
      const bass = BASS[step % BASS.length];
      if (lead != null) tone(midiToFreq(lead), STEP_DUR*0.85, 'square', musicGain, time, 0.10);
      if (bass != null) tone(midiToFreq(bass), STEP_DUR*3.6, 'triangle', musicGain, time, 0.16);
      if (step % 8 === 0) noiseBurst(0.14, 110, musicGain, time, 0.22, 'lowpass');
      else if (step % 4 === 0) noiseBurst(0.08, 1600, musicGain, time, 0.08, 'bandpass');
      else noiseBurst(0.025, 6000, musicGain, time, 0.02, 'highpass');
    }

    function schedulerLoop(){
      while (nextStepTime < actx.currentTime + 0.15){
        scheduleStep(currentStep, nextStepTime);
        nextStepTime += STEP_DUR;
        currentStep++;
      }
    }

    function startMusic(){
      ensure();
      if (musicPlaying) return;
      musicPlaying = true;
      currentStep = 0;
      nextStepTime = actx.currentTime + 0.1;
      schedulerLoop();
      schedulerTimer = setInterval(schedulerLoop, 50);
    }

    function setMuted(v){
      muted = v;
      localStorage.setItem('jinetesApocalipsis_muted', muted ? '1' : '0');
      if (masterGain) masterGain.gain.value = muted ? 0 : 1;
    }
    function toggleMuted(){ setMuted(!muted); return muted; }
    function isMuted(){ return muted; }

    function unlock(){ ensure(); startMusic(); }

    return {
      unlock,
      isMuted, toggleMuted,
      jump(){ if (!actx) return; const t = actx.currentTime; tone(420, 0.16, 'triangle', sfxGain, t, 0.5, 720); },
      slide(){ if (!actx) return; const t = actx.currentTime; noiseBurst(0.18, 500, sfxGain, t, 0.25, 'lowpass'); },
      coin(){ if (!actx) return; const t = actx.currentTime; tone(880,0.09,'square',sfxGain,t,0.35); tone(1318,0.12,'square',sfxGain,t+0.06,0.3); },
      hat(){ if (!actx) return; const t = actx.currentTime; tone(523,0.1,'triangle',sfxGain,t,0.4); tone(659,0.14,'triangle',sfxGain,t+0.07,0.35); },
      hit(){ if (!actx) return; const t = actx.currentTime; noiseBurst(0.28,220,sfxGain,t,0.5,'lowpass'); tone(120,0.3,'sawtooth',sfxGain,t,0.4,60); },
      shieldBlock(){ if (!actx) return; const t = actx.currentTime; tone(900,0.12,'square',sfxGain,t,0.4,300); noiseBurst(0.1,2500,sfxGain,t,0.2,'bandpass'); },
      ability(){ if (!actx) return; const t = actx.currentTime; [523,659,784].forEach((f,i)=> tone(f,0.12,'square',sfxGain,t+i*0.06,0.3)); },
      riderSwitch(){ if (!actx) return; const t = actx.currentTime; [523,659,784,1047].forEach((f,i)=> tone(f,0.16,'sawtooth',sfxGain,t+i*0.09,0.28)); },
      gameOver(){ if (!actx) return; const t = actx.currentTime; [440,392,349,294].forEach((f,i)=> tone(f,0.35,'sawtooth',sfxGain,t+i*0.18,0.3)); },
      click(){ if (!actx) return; const t = actx.currentTime; tone(700,0.05,'square',sfxGain,t,0.2); }
    };
  })();

  const muteBtn = document.getElementById('muteBtn');
  muteBtn.textContent = Audio_.isMuted() ? '🔇' : '🔊';
  muteBtn.addEventListener('click', function(){
    Audio_.unlock();
    const m = Audio_.toggleMuted();
    muteBtn.textContent = m ? '🔇' : '🔊';
  });
  window.addEventListener('pointerdown', function firstTouch(){
    Audio_.unlock();
    window.removeEventListener('pointerdown', firstTouch);
  }, { once: true });
  window.addEventListener('keydown', function firstKey(){
    Audio_.unlock();
    window.removeEventListener('keydown', firstKey);
  }, { once: true });

  // ---------- constants ----------
  const GRAVITY = 1700;
  const JUMP_VELOCITY = -680;
  const PLAYER_X = 110;
  const PLAYER_W = 38, PLAYER_H = 64;
  const SLIDE_W = 56, SLIDE_H = 32;

  const DIFFS = {
    facil:   { speed: 210, growth: 1.1, maxSpeed: 520, spawnMul: 1.25 },
    normal:  { speed: 270, growth: 1.6, maxSpeed: 650, spawnMul: 1.0 },
    dificil: { speed: 330, growth: 2.3, maxSpeed: 780, spawnMul: 0.8 }
  };

  const RIDERS = [
    { name: 'Pepe',      color: '#3b82f6', dark: '#1e40af', ability: 'doubleJump', abilityName: 'Doble salto',  cooldown: 4 },
    { name: 'Fabián',    color: '#22c55e', dark: '#15803d', ability: 'dash',       abilityName: 'Dash veloz',   cooldown: 6 },
    { name: 'Alejandro', color: '#ef4444', dark: '#991b1b', ability: 'shield',     abilityName: 'Escudo',       cooldown: 9 },
    { name: 'Chato',     color: '#eab308', dark: '#92610a', ability: 'magnet',     abilityName: 'Imán',         cooldown: 7 },
    { name: 'Chava',     color: '#a855f7', dark: '#6b21a8', ability: 'slowmo',     abilityName: 'Ralentizar',   cooldown: 8 }
  ];
  const SCORE_PER_RIDER = 500;

  // ---------- dom ----------
  const menuScreen = document.getElementById('menuScreen');
  const gameoverScreen = document.getElementById('gameoverScreen');
  const hud = document.getElementById('hud');
  const touchControls = document.getElementById('touchControls');
  const riderBanner = document.getElementById('riderBanner');
  const scoreLabel = document.getElementById('scoreLabel');
  const bestLabel = document.getElementById('bestLabel');
  const riderTag = document.getElementById('riderTag');
  const abilityBar = document.getElementById('abilityBar');
  const abilityLabel = document.getElementById('abilityLabel');
  const finalScore = document.getElementById('finalScore');
  const finalBest = document.getElementById('finalBest');
  const finalDiffLabel = document.getElementById('finalDiffLabel');

  function loadBests(){
    try {
      return JSON.parse(localStorage.getItem('jinetesApocalipsis_bestScores') || '{}');
    } catch(e){ return {}; }
  }
  function saveBest(diff, value){
    const b = loadBests();
    if (!b[diff] || value > b[diff]) b[diff] = value;
    localStorage.setItem('jinetesApocalipsis_bestScores', JSON.stringify(b));
    return b[diff] || 0;
  }
  function getBest(diff){
    const b = loadBests();
    return b[diff] || 0;
  }

  // ---------- state ----------
  let difficulty = 'normal';
  let screenState = 'menu'; // menu | playing | gameover
  let state = null;

  function freshState(){
    const d = DIFFS[difficulty];
    return {
      score: 0,
      distance: 0,
      scrollSpeed: d.speed,
      riderIndex: 0,
      nextRiderScore: SCORE_PER_RIDER,
      groundY: Math.round(H * 0.76),
      player: {
        y: 0, vy: 0, sliding: false, onGround: true, usedDoubleJump: false
      },
      invulnTimer: 0,
      shieldActive: false,
      shieldTimer: 0,
      slowmoTimer: 0,
      slowmoFactor: 1,
      dashFlashTimer: 0,
      magnetTimer: 0,
      abilityCooldownLeft: 0,
      obstacles: [],
      collectibles: [],
      particles: [],
      spawnTimer: 0.8,
      collectTimer: 1.0,
      bannerTimer: 0,
      slideKeyHeld: false,
      gameOverFlag: false,
      elapsed: 0,
      bgOffset: 0
    };
  }

  function currentRider(){ return RIDERS[state.riderIndex]; }

  function startGame(){
    state = freshState();
    state.player.y = state.groundY;
    screenState = 'playing';
    menuScreen.classList.add('hidden');
    gameoverScreen.classList.add('hidden');
    hud.classList.remove('hidden');
    touchControls.classList.remove('hidden');
    updateHUD();
    showRiderBanner(currentRider().name, true);
  }

  function endGame(){
    screenState = 'gameover';
    state.gameOverFlag = true;
    const best = saveBest(difficulty, Math.floor(state.score));
    finalScore.textContent = Math.floor(state.score);
    finalBest.textContent = best;
    finalDiffLabel.textContent = difficulty;
    hud.classList.add('hidden');
    touchControls.classList.add('hidden');
    riderBanner.classList.remove('show');
    gameoverScreen.classList.remove('hidden');
    Audio_.gameOver();
  }

  function showRiderBanner(name, first){
    riderBanner.textContent = first ? ('¡' + name + ' toma la delantera!') : ('¡Cambio de jinete: ' + name + '!');
    riderBanner.classList.add('show');
    state.bannerTimer = 2.0;
    Audio_.riderSwitch();
  }

  function updateHUD(){
    scoreLabel.textContent = Math.floor(state.score);
    bestLabel.textContent = getBest(difficulty);
    const rider = currentRider();
    riderTag.textContent = rider.name;
    riderTag.style.color = rider.color;
    riderTag.style.borderColor = rider.color;
    const cdFrac = 1 - (state.abilityCooldownLeft / rider.cooldown);
    abilityBar.style.width = Math.max(0, Math.min(1, cdFrac)) * 100 + '%';
    if (state.abilityCooldownLeft > 0){
      abilityLabel.textContent = rider.abilityName + ': ' + state.abilityCooldownLeft.toFixed(1) + 's';
    } else {
      abilityLabel.textContent = rider.abilityName + ' lista';
    }
  }

  // ---------- input ----------
  function jump(){
    if (screenState !== 'playing') return;
    const p = state.player;
    if (p.sliding) return;
    if (p.onGround){
      p.vy = JUMP_VELOCITY;
      p.onGround = false;
      p.usedDoubleJump = false;
      Audio_.jump();
    }
  }
  function startSlide(){
    if (screenState !== 'playing') return;
    state.slideKeyHeld = true;
    const p = state.player;
    if (p.onGround) p.sliding = true;
  }
  function endSlide(){
    state.slideKeyHeld = false;
    if (state.player) state.player.sliding = false;
  }

  function activateAbility(){
    if (screenState !== 'playing') return;
    if (state.abilityCooldownLeft > 0) return;
    const rider = currentRider();
    const p = state.player;
    switch(rider.ability){
      case 'doubleJump':
        if (!p.onGround && !p.usedDoubleJump){
          p.vy = JUMP_VELOCITY * 0.88;
          p.usedDoubleJump = true;
          state.abilityCooldownLeft = rider.cooldown;
          spawnBurst(PLAYER_X + PLAYER_W/2, p.y - PLAYER_H/2, rider.color);
          Audio_.ability();
        }
        break;
      case 'dash':
        state.invulnTimer = Math.max(state.invulnTimer, 1.0);
        state.dashFlashTimer = 1.0;
        state.abilityCooldownLeft = rider.cooldown;
        spawnBurst(PLAYER_X, p.y - PLAYER_H/2, rider.color);
        Audio_.ability();
        break;
      case 'shield':
        state.shieldActive = true;
        state.shieldTimer = 6.0;
        state.abilityCooldownLeft = rider.cooldown;
        Audio_.ability();
        break;
      case 'magnet':
        state.magnetTimer = 5.0;
        state.abilityCooldownLeft = rider.cooldown;
        Audio_.ability();
        break;
      case 'slowmo':
        state.slowmoTimer = 2.0;
        state.abilityCooldownLeft = rider.cooldown;
        Audio_.ability();
        break;
    }
  }

  window.addEventListener('keydown', function(e){
    if (e.repeat) return;
    if (e.code === 'Space' || e.code === 'ArrowUp'){ e.preventDefault(); jump(); }
    else if (e.code === 'ArrowDown'){ e.preventDefault(); startSlide(); }
    else if (e.code === 'KeyE' || e.code === 'ShiftLeft' || e.code === 'ShiftRight'){ e.preventDefault(); activateAbility(); }
    else if (e.code === 'Enter'){
      if (screenState === 'menu') startGame();
      else if (screenState === 'gameover') startGame();
    }
  });
  window.addEventListener('keyup', function(e){
    if (e.code === 'ArrowDown') endSlide();
  });

  function bindBtn(el, onDown, onUp){
    el.addEventListener('touchstart', function(e){ e.preventDefault(); onDown(); }, { passive:false });
    el.addEventListener('mousedown', function(e){ e.preventDefault(); onDown(); });
    if (onUp){
      el.addEventListener('touchend', function(e){ e.preventDefault(); onUp(); }, { passive:false });
      el.addEventListener('mouseup', function(e){ e.preventDefault(); onUp(); });
      el.addEventListener('touchcancel', function(e){ onUp(); });
    }
  }
  bindBtn(document.getElementById('btnJump'), jump);
  bindBtn(document.getElementById('btnSlide'), startSlide, endSlide);
  bindBtn(document.getElementById('abilityBtn'), activateAbility);

  // tap on canvas = jump, swipe down = slide
  let touchStartY = null, touchStartT = 0;
  canvas.addEventListener('touchstart', function(e){
    if (screenState !== 'playing') return;
    touchStartY = e.touches[0].clientY;
    touchStartT = performance.now();
  }, { passive:true });
  canvas.addEventListener('touchend', function(e){
    if (screenState !== 'playing' || touchStartY === null) return;
    const dt = performance.now() - touchStartT;
    touchStartY = null;
    if (dt < 300) jump();
  }, { passive:true });
  canvas.addEventListener('touchmove', function(e){
    if (screenState !== 'playing' || touchStartY === null) return;
    const dy = e.touches[0].clientY - touchStartY;
    if (dy > 40){ startSlide(); setTimeout(endSlide, 500); touchStartY = null; }
  }, { passive:true });

  // menu buttons
  document.querySelectorAll('.diff-btn[data-diff]').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.diff-btn[data-diff]').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      difficulty = btn.getAttribute('data-diff');
      Audio_.click();
    });
  });
  document.getElementById('playBtn').addEventListener('click', function(){ Audio_.click(); startGame(); });
  document.getElementById('retryBtn').addEventListener('click', function(){ Audio_.click(); startGame(); });
  document.getElementById('menuBtn').addEventListener('click', function(){
    Audio_.click();
    screenState = 'menu';
    gameoverScreen.classList.add('hidden');
    menuScreen.classList.remove('hidden');
  });

  // ---------- obstacles / collectibles ----------
  function spawnObstacle(){
    const d = DIFFS[difficulty];
    const roll = Math.random();
    const gY = state.groundY;
    let type;
    if (roll < 0.38) type = 'stall';
    else if (roll < 0.68) type = 'pilgrims';
    else type = 'hole';

    if (type === 'stall'){
      const w = 44 + Math.random()*22;
      const h = 36 + Math.random()*30;
      state.obstacles.push({ type:'stall', x: W + 40, w:w, h:h, y: gY });
    } else if (type === 'pilgrims'){
      const w = 90 + Math.random()*40;
      state.obstacles.push({ type:'pilgrims', x: W + 40, w:w, bandBottom: gY - 34, bandTop: gY - 96, y: gY });
    } else {
      const w = 70 + Math.random()*50;
      state.obstacles.push({ type:'hole', x: W + 40, w:w, y: gY });
    }
  }

  function spawnCollectible(){
    const gY = state.groundY;
    const kind = Math.random() < 0.5 ? 'candle' : 'hat';
    const heightRoll = Math.random();
    let y;
    if (heightRoll < 0.34) y = gY - 24;
    else if (heightRoll < 0.7) y = gY - 90;
    else y = gY - 150;
    const count = 1 + Math.floor(Math.random()*3);
    for (let i=0;i<count;i++){
      state.collectibles.push({ kind, x: W + 60 + i*34, y: y - Math.sin(i*0.8)*10, collected:false, r:12 });
    }
  }

  function spawnBurst(x,y,color){
    for (let i=0;i<10;i++){
      state.particles.push({
        x, y, vx:(Math.random()-0.5)*260, vy:(Math.random()-0.9)*260,
        life: 0.5 + Math.random()*0.3, maxLife: 0.8, color
      });
    }
  }

  // ---------- update ----------
  function playerBox(){
    const p = state.player;
    if (p.sliding){
      return { x: PLAYER_X - SLIDE_W/2, y: p.y - SLIDE_H, w: SLIDE_W, h: SLIDE_H };
    }
    return { x: PLAYER_X - PLAYER_W/2, y: p.y - PLAYER_H, w: PLAYER_W, h: PLAYER_H };
  }

  function overlap(ax,ay,aw,ah, bx,by,bw,bh){
    return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
  }

  function hitPlayer(){
    if (state.invulnTimer > 0) return;
    if (state.shieldActive){
      state.shieldActive = false;
      state.invulnTimer = 0.6;
      spawnBurst(PLAYER_X, state.player.y - PLAYER_H/2, '#ffffff');
      Audio_.shieldBlock();
      return;
    }
    Audio_.hit();
    endGame();
  }

  function update(dt){
    if (screenState !== 'playing') return;
    const rider = currentRider();
    const d = DIFFS[difficulty];
    state.elapsed += dt;

    // timers
    if (state.abilityCooldownLeft > 0) state.abilityCooldownLeft = Math.max(0, state.abilityCooldownLeft - dt);
    if (state.invulnTimer > 0) state.invulnTimer -= dt;
    if (state.dashFlashTimer > 0) state.dashFlashTimer -= dt;
    if (state.magnetTimer > 0) state.magnetTimer -= dt;
    if (state.shieldTimer > 0){
      state.shieldTimer -= dt;
      if (state.shieldTimer <= 0) state.shieldActive = false;
    }
    let speedFactor = 1;
    if (state.slowmoTimer > 0){
      state.slowmoTimer -= dt;
      speedFactor = 0.5;
    }
    if (state.bannerTimer > 0){
      state.bannerTimer -= dt;
      if (state.bannerTimer <= 0) riderBanner.classList.remove('show');
    }

    // difficulty ramp
    state.scrollSpeed = Math.min(d.maxSpeed, state.scrollSpeed + d.growth * dt);
    const effSpeed = state.scrollSpeed * speedFactor;
    state.bgOffset += effSpeed * dt;

    // score by distance
    state.score += effSpeed * dt * 0.12;
    if (state.score >= state.nextRiderScore){
      state.riderIndex = (state.riderIndex + 1) % RIDERS.length;
      state.nextRiderScore += SCORE_PER_RIDER;
      state.abilityCooldownLeft = 0;
      state.shieldActive = false;
      showRiderBanner(currentRider().name, false);
    }

    // player physics
    const p = state.player;
    const wasSliding = p.sliding;
    p.sliding = state.slideKeyHeld && p.onGround;
    if (p.sliding && !wasSliding) Audio_.slide();
    if (!p.onGround){
      p.vy += GRAVITY * dt;
      p.y += p.vy * dt;
      if (p.y >= state.groundY){
        p.y = state.groundY;
        p.vy = 0;
        p.onGround = true;
        p.usedDoubleJump = false;
      }
    } else {
      p.y = state.groundY;
    }

    // spawn timers
    state.spawnTimer -= dt;
    if (state.spawnTimer <= 0){
      spawnObstacle();
      const base = 1.0 + Math.random()*0.8;
      state.spawnTimer = base * d.spawnMul * (state.scrollSpeed < 400 ? 1 : 0.8);
    }
    state.collectTimer -= dt;
    if (state.collectTimer <= 0){
      spawnCollectible();
      state.collectTimer = 1.1 + Math.random()*1.2;
    }

    // obstacles
    const pBox = playerBox();
    for (let i = state.obstacles.length - 1; i >= 0; i--){
      const o = state.obstacles[i];
      o.x -= effSpeed * dt;
      if (o.x + o.w < -60){ state.obstacles.splice(i,1); continue; }

      if (o.type === 'stall'){
        if (overlap(pBox.x,pBox.y,pBox.w,pBox.h, o.x, o.y-o.h, o.w, o.h)){
          hitPlayer();
        }
      } else if (o.type === 'pilgrims'){
        if (!p.sliding){
          if (overlap(pBox.x,pBox.y,pBox.w,pBox.h, o.x, o.bandTop, o.w, o.bandBottom-o.bandTop)){
            hitPlayer();
          }
        }
      } else if (o.type === 'hole'){
        if (p.onGround){
          const feetX = PLAYER_X;
          if (feetX > o.x && feetX < o.x + o.w){
            hitPlayer();
          }
        }
      }
    }

    // collectibles
    for (let i = state.collectibles.length - 1; i >= 0; i--){
      const c = state.collectibles[i];
      c.x -= effSpeed * dt;
      if (state.magnetTimer > 0){
        const dx = PLAYER_X - c.x, dy = (p.y - PLAYER_H/2) - c.y;
        const dist = Math.hypot(dx,dy);
        if (dist < 260){
          c.x += (dx/dist) * 500 * dt;
          c.y += (dy/dist) * 500 * dt;
        }
      }
      if (c.x < -40){ state.collectibles.splice(i,1); continue; }
      const cb = playerBox();
      if (overlap(cb.x,cb.y,cb.w,cb.h, c.x-c.r, c.y-c.r, c.r*2, c.r*2)){
        state.collectibles.splice(i,1);
        state.score += c.kind === 'hat' ? 30 : 15;
        spawnBurst(c.x, c.y, c.kind === 'hat' ? '#c98a3d' : '#ffd873');
        if (c.kind === 'hat') Audio_.hat(); else Audio_.coin();
      }
    }

    // particles
    for (let i = state.particles.length - 1; i >= 0; i--){
      const pt = state.particles[i];
      pt.life -= dt;
      if (pt.life <= 0){ state.particles.splice(i,1); continue; }
      pt.x += pt.vx * dt;
      pt.y += pt.vy * dt;
      pt.vy += 500 * dt;
    }

    updateHUD();
  }

  // ---------- draw ----------
  function drawBackground(){
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0, '#2a2560');
    grad.addColorStop(0.45, '#7a4a7a');
    grad.addColorStop(0.72, '#e8825a');
    grad.addColorStop(1, '#ffb562');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    // sun
    ctx.beginPath();
    ctx.fillStyle = 'rgba(255,220,150,0.9)';
    ctx.arc(W*0.82, H*0.16, Math.min(W,H)*0.08, 0, Math.PI*2);
    ctx.fill();

    // distant hills
    ctx.fillStyle = '#5a3a55';
    ctx.beginPath();
    ctx.moveTo(0, state.groundY - 40);
    for (let x=0;x<=W;x+=40){
      ctx.lineTo(x, state.groundY - 40 - Math.sin((x+state.bgOffset*0.05)*0.01)*14);
    }
    ctx.lineTo(W, state.groundY);
    ctx.lineTo(0, state.groundY);
    ctx.closePath();
    ctx.fill();

    drawBasilica();

    // ground
    const groundGrad = ctx.createLinearGradient(0, state.groundY, 0, H);
    groundGrad.addColorStop(0, '#c99a5b');
    groundGrad.addColorStop(1, '#8a5a2e');
    ctx.fillStyle = groundGrad;
    ctx.fillRect(0, state.groundY, W, H - state.groundY);

    // cobblestone lines
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 2;
    const off = state.bgOffset % 40;
    for (let x = -off; x < W; x += 40){
      ctx.beginPath();
      ctx.moveTo(x, state.groundY + 6);
      ctx.lineTo(x - 14, H);
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.moveTo(0, state.groundY + 2);
    ctx.lineTo(W, state.groundY + 2);
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.stroke();
  }

  function drawBasilica(){
    const baseX = W*0.42 - (state.bgOffset*0.12) % (W*1.4);
    const baseY = state.groundY - 40;
    const scale = Math.min(W,H) / 900;
    ctx.save();
    ctx.translate(baseX, baseY);
    ctx.scale(scale, scale);
    ctx.fillStyle = '#caa370';

    // main facade
    ctx.fillRect(-70, -140, 140, 140);
    // towers
    ctx.fillRect(-110, -190, 34, 190);
    ctx.fillRect(76, -190, 34, 190);
    // tower tops (pointed)
    ctx.beginPath();
    ctx.moveTo(-110, -190); ctx.lineTo(-93, -230); ctx.lineTo(-76, -190); ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(76, -190); ctx.lineTo(93, -230); ctx.lineTo(110, -190); ctx.closePath(); ctx.fill();
    // dome base
    ctx.fillRect(-30, -180, 60, 40);
    // dome
    ctx.beginPath();
    ctx.arc(0, -180, 34, Math.PI, 0);
    ctx.fill();
    // dome tip
    ctx.beginPath();
    ctx.moveTo(-4,-214); ctx.lineTo(4,-214); ctx.lineTo(0,-232); ctx.closePath();
    ctx.fill();
    // door
    ctx.fillStyle = '#5a3418';
    ctx.beginPath();
    ctx.arc(0, -10, 16, Math.PI, 0);
    ctx.fill();
    ctx.fillRect(-16, -10, 32, 10);
    // windows
    ctx.fillStyle = 'rgba(255,220,150,0.55)';
    ctx.beginPath(); ctx.arc(-93,-90,7,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(93,-90,7,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(0,-70,10,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawStall(o){
    ctx.fillStyle = '#c9401e';
    ctx.fillRect(o.x, o.y - o.h, o.w, o.h*0.16);
    ctx.fillStyle = '#a85c32';
    ctx.fillRect(o.x + o.w*0.1, o.y - o.h*0.84, o.w*0.8, o.h*0.84);
    ctx.fillStyle = '#ffd873';
    for (let i=0;i<3;i++){
      ctx.beginPath();
      ctx.arc(o.x + o.w*(0.2+i*0.3), o.y - o.h*0.4, 4, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.strokeStyle = '#5a2e10';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(o.x, o.y); ctx.lineTo(o.x, o.y - o.h*0.9);
    ctx.moveTo(o.x+o.w, o.y); ctx.lineTo(o.x+o.w, o.y - o.h*0.9);
    ctx.stroke();
  }

  function drawPilgrims(o){
    const n = Math.max(3, Math.floor(o.w / 26));
    for (let i=0;i<n;i++){
      const px = o.x + 10 + i*(o.w-20)/(n-1||1);
      const py = o.bandBottom;
      ctx.fillStyle = '#6b4423';
      ctx.fillRect(px-7, py-30, 14, 30);
      ctx.fillStyle = '#e8b88a';
      ctx.beginPath();
      ctx.arc(px, py-36, 7, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#8a5a2e';
      ctx.beginPath();
      ctx.moveTo(px-10, py-42); ctx.lineTo(px+10, py-42); ctx.lineTo(px, py-52);
      ctx.closePath(); ctx.fill();
    }
    // raised banner they carry (the actual collision band, drawn as a bar)
    ctx.strokeStyle = '#8a2e12';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(o.x, o.bandTop);
    ctx.lineTo(o.x+o.w, o.bandTop);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,215,115,0.85)';
    ctx.fillRect(o.x, o.bandTop, o.w, 10);
  }

  function drawHole(o){
    ctx.fillStyle = '#1a1030';
    ctx.beginPath();
    ctx.ellipse(o.x + o.w/2, o.y+2, o.w/2, 10, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#0d0818';
    ctx.fillRect(o.x, o.y+2, o.w, H - o.y);
  }

  function drawCollectible(c){
    if (c.kind === 'candle'){
      ctx.fillStyle = '#fff3d6';
      ctx.fillRect(c.x-4, c.y-4, 8, 16);
      ctx.fillStyle = '#ff8c2b';
      ctx.beginPath();
      ctx.moveTo(c.x, c.y-18);
      ctx.quadraticCurveTo(c.x+6, c.y-10, c.x, c.y-4);
      ctx.quadraticCurveTo(c.x-6, c.y-10, c.x, c.y-18);
      ctx.fill();
    } else {
      ctx.fillStyle = '#a85c32';
      ctx.beginPath();
      ctx.ellipse(c.x, c.y+4, 16, 6, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#c9843d';
      ctx.beginPath();
      ctx.arc(c.x, c.y-4, 9, Math.PI, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#7a3e18';
      ctx.fillRect(c.x-9, c.y-4, 18, 3);
    }
  }

  function drawPlayer(){
    const rider = currentRider();
    const p = state.player;
    const flashing = state.invulnTimer > 0 && Math.floor(state.elapsed*20)%2===0;
    ctx.save();
    if (flashing) ctx.globalAlpha = 0.5;

    if (state.shieldActive){
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(160,220,255,0.9)';
      ctx.lineWidth = 3;
      ctx.arc(PLAYER_X, p.y - PLAYER_H/2, 40, 0, Math.PI*2);
      ctx.stroke();
    }

    if (p.sliding){
      const y = p.y;
      ctx.fillStyle = rider.dark;
      ctx.fillRect(PLAYER_X - SLIDE_W/2, y - SLIDE_H, SLIDE_W, SLIDE_H*0.6);
      ctx.fillStyle = rider.color;
      ctx.fillRect(PLAYER_X - SLIDE_W/2, y - SLIDE_H*0.6, SLIDE_W*0.8, SLIDE_H*0.6);
      ctx.fillStyle = '#e8b88a';
      ctx.beginPath();
      ctx.arc(PLAYER_X + SLIDE_W/2 - 6, y - SLIDE_H*0.55, 9, 0, Math.PI*2);
      ctx.fill();
    } else {
      const y = p.y;
      // legs
      ctx.fillStyle = rider.dark;
      const legOffset = p.onGround ? Math.sin(state.elapsed*18)*6 : 0;
      ctx.fillRect(PLAYER_X - 12, y - 22, 10, 22 + legOffset*0.2);
      ctx.fillRect(PLAYER_X + 2, y - 22, 10, 22 - legOffset*0.2);
      // torso
      ctx.fillStyle = rider.color;
      ctx.fillRect(PLAYER_X - PLAYER_W/2, y - PLAYER_H, PLAYER_W, PLAYER_H*0.55);
      // head
      ctx.fillStyle = '#e8b88a';
      ctx.beginPath();
      ctx.arc(PLAYER_X, y - PLAYER_H + 2, 12, 0, Math.PI*2);
      ctx.fill();
      // hat
      ctx.fillStyle = '#5a3418';
      ctx.beginPath();
      ctx.ellipse(PLAYER_X, y - PLAYER_H - 6, 16, 5, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(PLAYER_X, y - PLAYER_H - 10, 8, Math.PI, Math.PI*2);
      ctx.fill();
      // arm
      ctx.fillStyle = rider.dark;
      ctx.fillRect(PLAYER_X + PLAYER_W/2 - 4, y - PLAYER_H + 20, 8, 20);
    }

    if (state.dashFlashTimer > 0){
      ctx.strokeStyle = rider.color;
      ctx.globalAlpha = state.dashFlashTimer;
      for (let i=1;i<=3;i++){
        ctx.beginPath();
        ctx.moveTo(PLAYER_X - 20 - i*14, p.y - PLAYER_H*0.7);
        ctx.lineTo(PLAYER_X - 40 - i*14, p.y - PLAYER_H*0.7);
        ctx.lineWidth = 3;
        ctx.stroke();
      }
    }

    if (state.magnetTimer > 0){
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(255,215,90,0.5)';
      ctx.lineWidth = 2;
      ctx.arc(PLAYER_X, p.y - PLAYER_H/2, 260, 0, Math.PI*2);
      ctx.stroke();
    }

    ctx.restore();
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    if (!state){ return; }
    drawBackground();

    for (const o of state.obstacles){
      if (o.type === 'stall') drawStall(o);
      else if (o.type === 'pilgrims') drawPilgrims(o);
      else if (o.type === 'hole') drawHole(o);
    }
    for (const c of state.collectibles) drawCollectible(c);

    if (screenState === 'playing' || screenState === 'gameover') drawPlayer();

    for (const pt of state.particles){
      ctx.globalAlpha = Math.max(0, pt.life / pt.maxLife);
      ctx.fillStyle = pt.color;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 4, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // ---------- loop ----------
  let lastTime = null;
  function loop(ts){
    if (lastTime === null) lastTime = ts;
    let dt = (ts - lastTime) / 1000;
    lastTime = ts;
    if (dt > 0.05) dt = 0.05;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  // initial static background render for menu
  state = freshState();
  requestAnimationFrame(loop);
})();
</script>
</body>
